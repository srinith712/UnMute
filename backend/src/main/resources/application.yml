server:
  port: 8080

app:
  jwt:
    secret: mysecretkey123456789
    expiration-ms: 86400000

spring:
  datasource:
    url: jdbc:h2:mem:unmute-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true