server:
  port: 8080

app:
  jwt:
    # Load from environment variable JWT_SECRET in production.
    # Falls back to a local dev secret if the env var is not set.
    secret: ${JWT_SECRET:unmute-local-dev-secret-key-change-in-prod}
    expiration-ms: 86400000

spring:
  datasource:
    # File-based H2: data survives server restarts during development.
    # For production, replace with: jdbc:postgresql://host:5432/unmute
    url: jdbc:h2:file:./data/unmute-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # 'update' preserves data across restarts (does not drop tables)
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.unmute: DEBUG