server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/unmute_db
    username: postgres
    password: srinith123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

app:
  jwt:
    secret: UnMuteJwtSuperSecretKey2024ProductionReadyBackend!XYZ123456789ABCDEF
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.unmute: DEBUG
    org.springframework.security: WARN
